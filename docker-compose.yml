services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: superagent-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_AI_DASHSCOPE_API_KEY: ${SPRING_AI_DASHSCOPE_API_KEY}
      SEARCH_API_API_KEY: ${SEARCH_API_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: superagent-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
