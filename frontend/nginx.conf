server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 所有HTML请求都返回index.html（解决Vue路由的404问题）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and SSE to Spring Boot
    location /api/ {
        proxy_pass https://superagent-gym-241216-8-1300157778.sh.run.tcloudbase.com;
        proxy_http_version 1.1;

        proxy_set_header Host superagent-gym-241216-8-1300157778.sh.run.tcloudbase.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE needs buffering disabled
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
